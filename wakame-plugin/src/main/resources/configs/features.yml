# 映射: 维度技术名字 -> 维度友好名字
# 目前用于配置 %koish_current_dimension% 占位符的输出
dimension_key_mappings:
  minecraft:overworld: 主世界
  minecraft:nether: 下界
  minecraft:end: 末地

# 只有物品的所有者可以拾起死亡掉落的物品
only_owner_can_pickup_death_drops: false

# 要求玩家必须在潜行状态下才能够破坏盔甲架
require_sneaking_to_break_armor_stand: false

# 世界时间控制器的全局最小使用间隔 (刻)
world_time_control_use_interval_ticks: 12000

# 世界天气控制器的全局最小使用间隔 (刻)
world_weather_control_use_interval_ticks: 12000

# 禁止玩家在以下世界中与村民进行交易
disable_villager_trade_in_worlds:
  - koish:eden
  - koish:dune
  - koish:hollow

# 可以点亮下界传送门的维度名字列表
nether_portal_functional_dimensions:
  - koish:hollow

# 玩家明确进入服务器时, 修改其出现在世界里的位置坐标
teleport_on_join_explicit_server:
  # 是否启用该功能
  enabled: false
  # 执行传送的条件
  conditions:
    - { type: server_group, group: xmine }
  # 传送到的位置列表
  locations:
    - { world: koish:eden, x: 2500, y: 128, z: 2500 }
    - { world: koish:eden, x: 2500, y: 128, z: -2500 }
    - { world: koish:eden, x: -2500, y: 128, z: 2500 }
    - { world: koish:eden, x: -2500, y: 128, z: -2500 }
  # 传送后应用的效果
  effects:
    - { type: minecraft:slow_falling, duration: 200, amplifier: 1 }

# 给战利品箱生成战利品时先清空容器内容物
reset_container_on_loot_generate: false

# 阻止指定维度下的战利品箱在指定事件下被玩家摧毁
# 一级 key 是维度的标识符, 二级 key 是事件类型
stop_breaking_loot_chests:
  koish:eden:
    block_break: true
    block_explode: true
    entity_explode: true
    vehicle_destroy: true
  koish:dune:
    block_break: true
    block_explode: true
    entity_explode: true
    vehicle_destroy: true
  koish:hollow:
    block_break: true
    block_explode: true
    entity_explode: true
    vehicle_destroy: true
  koish:nether:
    block_break: true
    block_explode: true
    entity_explode: true
    vehicle_destroy: true
  koish:end:
    block_break: true
    block_explode: true
    entity_explode: true
    vehicle_destroy: true

# 死亡时不掉落以下槽位组 (EquipmentSlotGroup) 中的物品
# EquipmentSlotGroup: https://jd.papermc.io/paper/1.21.11/org/bukkit/inventory/EquipmentSlotGroup.html
equipment_slots_to_keep_on_death:
  - hand
  - armor

# 兼容 Just Enough Items (Fabric/NeoForge), 基本没用, 留着仅供参考说不定以后会用到
# 限制: 客户端只会识别配方里的原版物品类型(Item), 不会识别任何额外数据(DataComponentMap)
jei_compatibility: false

# 玩家潜行换手 (默认 Shift+F) 时执行的动作列表
# 触发时会取消原版换手行为, 依次执行以下动作
# 支持的动作类型:
#   player_chat    - 以玩家身份发送聊天消息
#   player_command - 以玩家身份执行指令 (不需要加 /)
#   console_command - 以控制台身份执行指令
sneak_swap_actions:
  - type: player_chat
    command: "Hello!"
  - type: player_command
    command: "quick_bar"
  - type: console_command
    command: "say 控制台指令已执行!"
