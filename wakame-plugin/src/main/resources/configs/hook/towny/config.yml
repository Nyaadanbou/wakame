# TODO 新物品 & 新机制: 城镇权益激活卡
#
# 设计思路:
# 米团玩家可以使用特殊道具: 城镇权益激活卡
# 在城镇领地内使用时, 根据玩家当前的米团等级, 向玩家当前位置上的城镇施加一个永久的*城镇权益效果*
# *城镇权益效果*包括:
# - 领地上限数量的加成
# - 圈地花费的修饰系数
# - 维护费的修饰系数
# 在一个家园位面里, 每名米团玩家最多将他的城镇权益效果施加到一个城镇上; 不同家园位面的城镇权益效果互不影响

# 城镇权益配置
#
# 每个权限组下可以配置不同的权益类型, 未配置的权益不会生效
# 在配置文件中越靠后的权限组优先级越高
# 当城镇有多个玩家激活了权益时:
#   claim_block_bonus — 所有数量求和
#   claim_cost_multiplier — 所有系数相乘
#   town_upkeep_cost_multiplier — 所有系数相乘
#   nation_upkeep_cost_multiplier — 所有系数相乘
boost:
  "group.vip1":
    claim_block_bonus: 16
    claim_cost_multiplier: 0.95
    town_upkeep_cost_multiplier: 0.95
    nation_upkeep_cost_multiplier: 0.95
  "group.vip2":
    claim_block_bonus: 32
    claim_cost_multiplier: 0.88
    town_upkeep_cost_multiplier: 0.88
    nation_upkeep_cost_multiplier: 0.88
  "group.vip3":
    claim_block_bonus: 64
    claim_cost_multiplier: 0.81
    town_upkeep_cost_multiplier: 0.81
    nation_upkeep_cost_multiplier: 0.81
  "group.vip4":
    claim_block_bonus: 128
    claim_cost_multiplier: 0.74
    town_upkeep_cost_multiplier: 0.74
    nation_upkeep_cost_multiplier: 0.74

# 城镇列表菜单设置
town_list_menu:
  # 默认公告板
  default_board:
    - "镇长很懒，公告板空空如也"
  # 条目过滤器
  entry_filter:
    # 城镇需要为破产状态
    - type: bankrupt
      invert: true  # invert: true 可反转语义
    # 城镇需要为 "public"
    - type: public
      invert: false
    # 城镇需要已经加入市场网络
    - type: joined_market_network
      invert: false
  # UI 设置
  ui_settings:
    # UI 标题
    title: "全部城镇 (当前位面)"
    # UI 布局
    # ?: hint
    # .: background
    # <: prev_page
    # >: next_page
    # x: entry
    structure:
      - ". . . . ? . . . ."
      - ". x x x x x x x ."
      - ". x x x x x x x ."
      - ". x x x x x x x ."
      - ". x x x x x x x ."
      - "< . . . . . . . >"
    # UI 图标
    icons:
      background: "internal/menu/common/default/background"
      prev_page: "internal/menu/common/default/prev_page"
      next_page: "internal/menu/common/default/next_page"
      hint: "internal/menu/towny/townlist/hint"
      entry: "internal/menu/towny/townlist/entry"

# 国家列表菜单设置
nation_list_menu:
  # 默认公告板
  default_board:
    - "国王很懒，公告板空空如也"
  # 条目过滤器
  entry_filter:
    # 国家需要为 "public"
    - type: public
      invert: false
  # UI 设置
  ui_settings:
    # UI 标题
    title: "全部国家 (当前位面)"
    # UI 布局
    # ?: hint
    # .: background
    # <: prev_page
    # >: next_page
    # x: entry
    structure:
      - ". . . . ? . . . ."
      - ". x x x x x x x ."
      - ". x x x x x x x ."
      - ". x x x x x x x ."
      - ". x x x x x x x ."
      - "< . . . . . . . >"
    # UI 图标
    icons:
      background: "internal/menu/common/default/background"
      prev_page: "internal/menu/common/default/prev_page"
      next_page: "internal/menu/common/default/next_page"
      hint: "internal/menu/towny/nationlist/hint"
      entry: "internal/menu/towny/nationlist/entry"
